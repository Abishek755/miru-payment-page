<!DOCTYPE html>
<html>
<head>
  <script src="https://payments.zoho.in/static/js/checkout.js"></script>
</head>
<body>

<h2>Loading Payment...</h2>

<script>
function startPayment() {

    var urlParams = new URLSearchParams(window.location.search);
    var amount = urlParams.get("amount") || "100";

    var options = {
        "api_key": "YOUR_API_KEY_HERE",
        "amount": amount * 100,
        "currency": "INR",
        "name": "Miru Cravings",
        "description": "Food Order",

        "handler": function (response) {
            alert("Payment Successful: " + response.payment_id);
        }
    };

    var zp = new ZohoPayments(options);
    zp.open();
}

// Delay execution (IMPORTANT FIX)
setTimeout(startPayment, 1000);
</script>

</body>
</html>
