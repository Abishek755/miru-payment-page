<!DOCTYPE html>
<html>
<head>
  <script src="https://payments.zoho.in/static/js/checkout.js"></script>
</head>
<body>

<h2>Redirecting to Payment...</h2>

<button id="payBtn" style="display:none;">Pay</button>

<script>
function startPayment() {

    var urlParams = new URLSearchParams(window.location.search);
    var amount = urlParams.get("amount") || "100";

    var options = {
        api_key: "YOUR_API_KEY_HERE",
        amount: parseInt(amount) * 100,
        currency: "INR",
        name: "Miru Cravings",
        description: "Food Order",

        handler: function (response) {
            alert("Payment Successful: " + response.payment_id);
        }
    };

    var zp = new ZohoPayments(options);

    document.getElementById("payBtn").onclick = function() {
        zp.open();
    };

    // simulate user click (IMPORTANT)
    setTimeout(function() {
        document.getElementById("payBtn").click();
    }, 1000);
}

startPayment();
</script>

</body>
</html>
