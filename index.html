<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 10px;
        }

        .menu-card {
            background: white;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
        }

        img {
            width: 100%;
            border-radius: 8px;
        }

        button {
            background: green;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<h2>Menu</h2>
<div id="menu-container">Loading...</div>

<script>
function loadMenu() {

    let data = [
        {Item_Name:"Dosa", Price:50, Image:"https://via.placeholder.com/150"},
        {Item_Name:"Idli", Price:30, Image:"https://via.placeholder.com/150"}
    ];

    let html = "";

    data.forEach(item => {
        html += `
            <div class="menu-card">
                <img src="${item.Image}">
                <h3>${item.Item_Name}</h3>
                <p>₹${item.Price}</p>
                <button>Add</button>
            </div>
        `;
    });

    document.getElementById("menu-container").innerHTML = html;
}

loadMenu();
</script>

</body>
</html>
