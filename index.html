<!DOCTYPE html>
<html>
<head>
  <script src="https://payments.zoho.in/static/js/checkout.js"></script>
</head>
<body>

<h2>Loading Payment...</h2>

<script>
window.onload = function() {

    const params = new URLSearchParams(window.location.search);
    const amount = params.get("amount") || "100";

    const options = {
        api_key: "1003.3fecbd31d1ec232867c967de731006e6.abb5b39f6f778e0744d116626d488c9e",
        amount: parseInt(amount) * 100,
        currency: "INR",
        name: "Miru Cravings",
        description: "Food Order",

        handler: function (response) {
            alert("Payment Success: " + response.payment_id);
        }
    };

    const zp = new ZohoPayments(options);
    zp.open();
};
</script>

</body>
</html>
